services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vios
      POSTGRES_PASSWORD: vios
      POSTGRES_DB: vios
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vios"]
      interval: 5s
      timeout: 3s
      retries: 10

  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vios:vios@db:5432/vios
    ports: ["${ENGINE_PORT:-8000}:8000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/version').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10

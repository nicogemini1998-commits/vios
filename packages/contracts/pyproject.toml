[project]
name = "vios-contracts"
version = "0.0.1"
description = "Shared VIOS data contracts (stubs in M0)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vios_contracts"]
